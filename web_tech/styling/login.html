<!DOCTYPE html>
<html>

<head>

    <title>Login Form</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>

        h2
        {
            text-align: center;
            color: darkblue;
        }

        input
        {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>Login Form</h2>

        <label>Username</label>
        <input type="text">

        <label>Password</label>
        <input type="password">

        <!-- Inline CSS -->
        <button style="background-color:green;
                       color:white;
                       padding:10px;
                       width:100%;">
            Login
        </button>

    </div>

</body>
</html>
